name: Crew - Production Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/crew/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install Packages
        run: yarn install --immutable

      - name: Set .env
        run: |
          echo "${{ secrets.CREW_PROJECT_ENV }}" > apps/crew/.env.local
          echo "NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID=${{ secrets.CREW_NEXT_PUBLIC_GOOGLE_TAG_MANAGER_ID }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_KAKAO_TALK_PLUGIN_KEY=${{ vars.CREW_NEXT_PUBLIC_KAKAO_TALK_PLUGIN_KEY }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_SENTRY_DSN=${{ vars.CREW_NEXT_PUBLIC_SENTRY_DSN }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_AMPLITUDE_API_KEY=${{ vars.CREW_NEXT_PUBLIC_AMPLITUDE_API_KEY }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_APP_ENV=production" >> apps/crew/.env.local

      - name: Build
        run: yarn build:crew

      - name: Publish
        run: yarn workspace crew run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
