name: Playground - Development Deploy

on:
  push:
    branches: [develop]
    paths:
      - 'apps/playground/**'
      - 'packages/**'
      - 'package.json'
      - 'yarn.lock'
  pull_request:
    paths:
      - 'apps/playground/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install Packages
        run: yarn install --immutable

      - name: Set .env
        run: echo "${{ vars.PLAYGROUND_DEVELOPMENT_ENV }}" > apps/playground/.env.local

      - name: Build
        run: yarn build:playground

      - name: Publish
        id: publish
        run: |
          set -o pipefail
          yarn workspace playground run deploy --branch="${{ github.head_ref || github.ref_name }}" | tee deploy.log
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$(cat deploy.log)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get Preview URL
        if: github.event_name == 'pull_request'
        uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        with:
          text: ${{ steps.publish.outputs.log }}
          regex: '(https:\/\/[A-z0-9]+\.[^\.]+\.pages\.dev)'

      - name: Find Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v2
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Playground 프리뷰 배포'

      - name: Create or update comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v2
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 Playground 프리뷰 배포 확인하기 🚀

            ${{ steps.regex-match.outputs.group1 }}
          edit-mode: replace
