name: Playground - Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/playground/**"
      - "packages/**"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:

jobs:
  build-app:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      env: ${{ vars.PLAYGROUND_PRODUCTION_ENV }}

  deploy:
    needs: build-app
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v3

      - name: Download Built App
        uses: actions/download-artifact@v4
        with:
          name: built-app
          path: out

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.1.1 --activate
          yarn -v

      - name: Cache Yarn
        uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Packages
        run: yarn install --immutable

      - name: Deploy
        run: cd out && yarn run wrangler pages deploy . --project-name "${{ secrets.CLOUDFLARE_PAGES_PLAYGROUND_PROJECT_NAME }}" --commit-message "${{ github.sha }}" --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
