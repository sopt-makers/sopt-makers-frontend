name: Crew - Development Deploy

on:
  push:
    branches: [develop]
    paths:
      - "apps/crew/**"
      - "packages/**"
      - "package.json"
      - "yarn.lock"
  pull_request:
    paths:
      - "apps/crew/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  deploy:
    environment: development
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout Branch
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.1.1 --activate
          yarn -v

      - name: Install Packages
        run: yarn install --immutable

      - name: Set .env
        run: |
          echo "${{ secrets.CREW_PROJECT_ENV }}" > apps/crew/.env.local
          echo "NEXT_PUBLIC_KAKAO_TALK_PLUGIN_KEY=${{ vars.CREW_NEXT_PUBLIC_KAKAO_TALK_PLUGIN_KEY }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_SENTRY_DSN=${{ vars.CREW_NEXT_PUBLIC_SENTRY_DSN }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_AMPLITUDE_API_KEY=${{ vars.CREW_NEXT_PUBLIC_AMPLITUDE_API_KEY }}" >> apps/crew/.env.local
          echo "NEXT_PUBLIC_APP_ENV=development" >> apps/crew/.env

      - name: Build
        run: yarn build:crew

      - name: Publish
        run: yarn run wrangler pages publish "apps/crew/out" --project-name "${{ secrets.CLOUDFLARE_PAGES_CREW_PROJECT_NAME }}" --commit-message "${{ github.sha }}" --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
